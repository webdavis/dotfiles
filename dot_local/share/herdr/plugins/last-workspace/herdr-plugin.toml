id = "webdavis.last-workspace"
name = "Last Workspace"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "Toggle between the two most-recently-focused workspaces (a true MRU last-workspace, which herdr has no builtin for)."
platforms = ["macos", "linux"]

# Compiled at install time. `herdr plugin link` (local dev) does NOT run this, so
# the chezmoiscript that links the plugin builds it first.
[[build]]
command = ["cargo", "build", "--release", "--locked"]

# Fires on EVERY workspace focus change — mouse, picker, or chord alike — which
# is why this is correct where a key-bound shell script was not: the script only
# saw switches routed through itself, this sees them all.
[[events]]
on = "workspace.focused"
command = ["./target/release/last-workspace", "record"]

# Bound to a key via [[keys.command]] type = "plugin_action" in the user's herdr
# config. Action id `last_workspace` mirrors herdr's builtin `last_pane`, so the
# binding command reads webdavis.last-workspace.last_workspace.
[[actions]]
id = "last_workspace"
title = "Last workspace (MRU toggle)"
command = ["./target/release/last-workspace", "bounce"]
