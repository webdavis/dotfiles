matches:
  # ── Recognition / familiarity ─────────────────────────────────────────────

  - trigger: ",,rc"
    replace: "I would recognize"

  - trigger: ";;rc"
    replace: "No I wouldn't recognize anyone."

  - trigger: ";;ni"
    replace: "I have no idea."

  - trigger: ";;yf"
    replace: "Yes, I am familiar with it."

  - trigger: ";;nf"
    replace: "I am not familiar."

  # ── Applicability / fit ───────────────────────────────────────────────────

  - trigger: ";;da"
    replace: "That doesn't apply."

  - trigger: ";;na"
    replace: "It's not applicable."
  # Note: was 2× — second entry "It doesn't apply." removed (§6.4); use ;;da for that phrasing.

  - trigger: ";;sk"
    replace: "skip it"

  # ── Recommendations / improvements ────────────────────────────────────────

  - trigger: ",,imp"
    replace: "No I wouldn't recommend any improvements."

  - trigger: ";;mo"
    replace: "Most important is"

  - trigger: ";;rm"
    replace: "Remove from PCI. Doesn't want to be called again."

  # ── Survey participants ───────────────────────────────────────────────────

  - trigger: ";;rd"
    replace: "(the resident)"

  - trigger: ",,rd"
    replace: "(the residents)"

  - trigger: ";;rp"
    replace: "(responsible party)"

  - trigger: ";;rs"
    replace: "(The respondent was unable to complete the remainder of the survey.)"

  - trigger: ";;sw"
    replace: "social worker"

  # ── Reasons / explanations ────────────────────────────────────────────────

  - trigger: ";;jb"
    replace: "Just because"

  - trigger: ";;ch"
    replace: "It was chosen"

  - trigger: ";;ict"
    replace: "I can't think of anything."

  - trigger: ";;nt"
    replace: "Not at this time."

  - trigger: ";;iw"
    replace: "I would tell them"

  - trigger: ",,iw"
    replace: "I would say"

  # ── Quality / values ──────────────────────────────────────────────────────

  - trigger: ";;vo"
    replace: "Very Good"

  - trigger: ";;av"
    replace: "Average"

  - trigger: ",,acc"
    replace: "accommodating"

  - trigger: ";;acc"
    replace: "according"

  - trigger: ";;ia"
    replace: "I appreciate"

  # ── Healthcare / facilities ───────────────────────────────────────────────

  - trigger: ";;pt"
    replace: "physical therapy"

  - trigger: ";;ot"
    replace: "occupational therapy"

  - trigger: ";;al"
    replace: "assisted living"

  - trigger: ";;hc"
    replace: "healthcare"

  - trigger: "alz"
    replace: "Alzheimer's"

  - trigger: ";;ap"
    replace: "A Place For Mom"

  # ── PCI follow-up emails (migrated from local email.yml §6.5) ─────────────

  - trigger: ";;ff"
    replace: "0 surveys for the following facilities"

  - trigger: ";;0s"
    replace: "Dani,\n\nI received 0 surveys on two attempts for the following facilities:\n\n$|$\n\nThe following facilities had 0 PCI:\n\n\nBest,\nStephen Davis\n"

  - trigger: ",,0s"
    replace: "Dani,\n\nI received 0 additional surveys after completing my second attempt for the following facility:\n\n$|$\n\nBest Regards,\nStephen Davis\n"
