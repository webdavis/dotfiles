{
  "options": {
    "logger_path": "{{ .chezmoi.homeDir }}/.local/log/osquery",
    "disable_events": "false",
    "enable_file_events": "true",
    "events_expiry": "21600"
  },
  "schedule": {
    "file_events_recent": {
      "query": "SELECT target_path, category, action, time, sha256 FROM file_events;",
      "interval": 10,
      "removed": false
    },
    "es_launchd_writes": {
      "query": "SELECT path, filename, dest_filename, pid, parent, event_type, time FROM es_process_file_events WHERE filename LIKE '%/LaunchAgents/%' OR filename LIKE '%/LaunchDaemons/%' OR dest_filename LIKE '%/LaunchAgents/%' OR dest_filename LIKE '%/LaunchDaemons/%';",
      "interval": 10,
      "removed": false
    },
    "new_admin_user": {
      "query": "SELECT u.username, u.uid FROM users u JOIN user_groups ug ON u.uid = ug.uid WHERE ug.gid = 80;",
      "interval": 3600,
      "removed": false,
      "platform": "darwin",
      "description": "Members of the local admin group (gid 80). A new differential row is a newly-created administrator account (privilege escalation) and pages. The baseline (root + the operator) seeds silently via the counter==0 discard. removed:false so deleting an admin does not page. Top-level (not a pack) on purpose: the alerter gate matches the bare name new_admin_user, whereas a pack entry would emit pack_<pack>_new_admin_user and never match."
    }
  },
  "packs": {
    "intrusion-detection": "/var/osquery/packs/intrusion-detection.conf",
    "security-policy-regression": "/var/osquery/packs/security-policy-regression.conf",
    "installed-software-drift": "/var/osquery/packs/installed-software-drift.conf",
    "agent-attack-surface": "/var/osquery/packs/agent-attack-surface.conf"
  },
  "file_paths": {
    "authorized_keys": [
      "{{ .chezmoi.homeDir }}/.ssh/authorized_keys",
      "{{ .chezmoi.homeDir }}/.ssh/authorized_keys2"
    ],
    "allowlist_file": [
      "{{ .chezmoi.homeDir }}/.config/osquery/page-launchd-allowlist.txt"
    ],
    "pipeline_integrity": [
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-results-alerter.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-alert-dispatch.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-enrich-finding.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-firewall-gatekeeper-monitor.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-uptime-watchdog.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-digest.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-allowlist.sh",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-results-alerter.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-firewall-gatekeeper-monitor.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-uptime-watchdog.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-digest.plist",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-tailscale-monitor.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-heartbeat.sh",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-tailscale-monitor.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-heartbeat.plist"
    ],
    "launch_agents": [
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/%%",
      "/Library/LaunchAgents/%%"
    ],
    "launch_daemons": [
      "/Library/LaunchDaemons/%%"
    ],
    "sudoers": [
      "/etc/sudoers",
      "/etc/sudoers.d/%%"
    ],
    "sshd_config": [
      "/etc/ssh/sshd_config",
      "/etc/ssh/sshd_config.d/%%"
    ]
  },
  "file_paths_hashes": {
    "authorized_keys": [
      "{{ .chezmoi.homeDir }}/.ssh/authorized_keys",
      "{{ .chezmoi.homeDir }}/.ssh/authorized_keys2"
    ],
    "pipeline_integrity": [
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-results-alerter.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-alert-dispatch.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-enrich-finding.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-firewall-gatekeeper-monitor.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-uptime-watchdog.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-digest.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-allowlist.sh",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-results-alerter.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-firewall-gatekeeper-monitor.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-uptime-watchdog.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-digest.plist",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-tailscale-monitor.sh",
      "{{ .chezmoi.homeDir }}/.local/bin/osquery-heartbeat.sh",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-tailscale-monitor.plist",
      "{{ .chezmoi.homeDir }}/Library/LaunchAgents/com.webdavis.osquery-heartbeat.plist"
    ],
    "sudoers": [
      "/etc/sudoers",
      "/etc/sudoers.d/%%"
    ],
    "sshd_config": [
      "/etc/ssh/sshd_config",
      "/etc/ssh/sshd_config.d/%%"
    ]
  }
}
