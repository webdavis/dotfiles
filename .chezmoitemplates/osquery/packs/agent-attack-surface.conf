{
  "queries": {
    "agent_exposure_changed": {
      "query": "SELECT lp.address, lp.port, lp.protocol, p.name, p.path FROM listening_ports lp JOIN processes p ON lp.pid = p.pid WHERE lp.address NOT IN ('127.0.0.1', '::1') AND lp.address NOT LIKE '127.%' AND lp.address NOT LIKE 'fe80:%' AND (p.cmdline LIKE '%mcp%' OR lp.port IN (5432, 6767, 8644) OR p.path LIKE '%hermes%' OR p.path LIKE '%/Paseo%');",
      "interval": 600,
      "platform": "darwin",
      "description": "An agent control-plane / MCP / data service bound off-loopback. Pattern-based, NOT a fixed port list (MCP servers multiply and their ports drift): any MCP server (cmdline ~ mcp: qmd 8181, workspace-mcp 8000-8004, future ones), the hermes gateway (8644), the paseo daemon (6767), or postgres (5432). These belong on 127.0.0.1; off-loopback exposes the operator's remote-access / data surface off-box. Pages."
    },
    "agent_authfile_changed": {
      "query": "SELECT path, sha256 FROM hash WHERE path IN ('{{ .chezmoi.homeDir }}/.config/osquery/webhook-secret', '{{ .chezmoi.homeDir }}/.paseo/daemon-keypair.json', '{{ .chezmoi.homeDir }}/.hermes/.env', '{{ .chezmoi.homeDir }}/.codex/config.toml');",
      "interval": 600,
      "platform": "darwin",
      "description": "A content change to an agent auth/credential file. webhook-secret + daemon-keypair.json page (forge/mute alerts, hijack access); .env + config.toml digest. The alerter renders the basename only — the sha256 never reaches the payload."
    },
    "agent_binary_changed": {
      "query": "SELECT path, sha256 FROM hash WHERE path IN ('/opt/homebrew/bin/codex', '/opt/homebrew/bin/paseo');",
      "interval": 3600,
      "platform": "darwin",
      "description": "An agent CLI hash change. A hash cannot tell a legit (frequent) self-update from a swap, so this is LOG-ONLY (recorded in results.log for forensics, never delivered). claude is excluded: its 214 MB binary exceeds osquery read_max, so the hash is always empty."
    }
  }
}
