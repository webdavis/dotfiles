{
  "queries": {
    "firewall_state": {
      "query": "SELECT global_state, stealth_enabled, logging_enabled FROM alf;",
      "interval": 3600,
      "platform": "darwin",
      "description": "Application firewall posture. global_state: 0=off, 1=on, 2=block-all-incoming. A drop to 0 is the regression signal. (allow_signed_enabled omitted — empty/dead on modern macOS.)"
    },
    "gatekeeper_state": {
      "query": "SELECT assessments_enabled, dev_id_enabled FROM gatekeeper;",
      "interval": 3600,
      "platform": "darwin",
      "description": "Gatekeeper enforcement. assessments_enabled flipping to 0 (e.g. spctl --master-disable) is the regression signal."
    },
    "sip_state": {
      "query": "SELECT enabled, enabled_nvram FROM sip_config WHERE config_flag = 'sip';",
      "interval": 3600,
      "platform": "darwin",
      "description": "System Integrity Protection master switch (running vs persisted nvram state). Note: SIP is intentionally OFF on this host — the notification layer treats that as a known exception."
    },
    "filevault_state": {
      "query": "SELECT name, filevault_status, encryption_status, encrypted FROM disk_encryption WHERE type = 'APFS Encryption' AND filevault_status = 'on';",
      "interval": 21600,
      "platform": "darwin",
      "description": "FileVault-encrypted APFS volumes (informational only). Rows present = FileVault on. A row DISAPPEARING is NOT a regression signal: APFS volume identity churn drops a row while the data volume stays encrypted (issue #18). Genuine FileVault-off is detected by filevault_off, not this query; a removed row here is log-only."
    },
    "screenlock_state": {
      "query": "SELECT enabled, grace_period FROM screenlock;",
      "interval": 3600,
      "platform": "darwin",
      "description": "Screen-lock password requirement. enabled flipping to 0, or a growing grace_period, weakens lock-screen protection."
    },
    "remote_access_sharing_state": {
      "query": "SELECT 'screen_sharing' AS service FROM sharing_preferences WHERE screen_sharing = 1 UNION ALL SELECT 'remote_management' FROM sharing_preferences WHERE remote_management = 1 UNION ALL SELECT 'remote_apple_events' FROM sharing_preferences WHERE remote_apple_events = 1 UNION ALL SELECT 'internet_sharing' FROM sharing_preferences WHERE internet_sharing = 1;",
      "interval": 3600,
      "platform": "darwin",
      "description": "Rebuilt as an ON-transition detector. Emits one row per currently-ENABLED high-risk service, so a new differential row = that service just turned on (a remote-control path opened) -> page. Excludes remote_login (SSH) and file_sharing: both are intentionally ON on dresden (the operator's own access). The counter==0 baseline discards anything already on at first run; all four watched services are currently OFF."
    },
    "filevault_off": {
      "query": "SELECT 'filevault' AS protection WHERE NOT EXISTS (SELECT 1 FROM disk_encryption WHERE type = 'APFS Encryption' AND filevault_status = 'on');",
      "interval": 3600,
      "platform": "darwin",
      "description": "FileVault off-detector. Returns one constant row only when NO APFS volume is FileVault-encrypted (FileVault OFF), empty otherwise. Differential (NOT snapshot) on purpose: snapshot results are written to osqueryd.snapshots.log, which the alerter does not read, so as a snapshot this never reached #priority (issue #18). As a differential query the off-row is logged 'added' to osqueryd.results.log when FileVault goes off, exactly like firewall_state. The row is constant, so APFS volume identity churn cannot trigger it; it fires only on genuine FileVault-off."
    },
    "screenlock_off": {
      "query": "SELECT 'screenlock' AS protection WHERE EXISTS (SELECT 1 FROM screenlock WHERE enabled = 0);",
      "interval": 3600,
      "platform": "darwin",
      "description": "Screen-lock off-detector, mirroring filevault_off. Returns one constant row only when the screen-lock password requirement is disabled, empty otherwise. Differential (NOT snapshot) on purpose: snapshot results are written to osqueryd.snapshots.log, which the alerter does not read, so the removed snapshot-era screenlock_off never reached #priority. As a differential query the off-row is logged 'added' to osqueryd.results.log the hour the lock is disabled. The row is constant, so it cannot churn; it fires only on genuine screen-lock-off. Absolute-state query per FX5: a counter==0 first observation with the lock already off PAGES rather than seeding silently. The screenlock table was verified readable on this host in BOTH the root osqueryd daemon context and the user context (osquery 5.23.1); if a future osquery version restricts the table to user context, the query would go permanently empty, which the daily heartbeat/watchdog would not catch, so re-verify after major osquery upgrades."
    }
  }
}
