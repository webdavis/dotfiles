{
  "queries": {
    "installed_apps": {
      "query": "SELECT name, path, bundle_identifier, bundle_short_version, bundle_version FROM apps;",
      "interval": 86400,
      "platform": "darwin",
      "description": "Drift in installed .app bundles — an app appearing, disappearing, or changing version. Volatile last_opened_time omitted so usage does not register as drift."
    },
    "homebrew_packages": {
      "query": "SELECT name, version, type, app_name, auto_updates FROM homebrew_packages;",
      "interval": 86400,
      "platform": "darwin",
      "description": "Drift in Homebrew formulae and casks — package added, removed, or version-bumped."
    },
    "safari_extensions": {
      "query": "SELECT uid, name, identifier, version, bundle_version, path FROM safari_extensions;",
      "interval": 43200,
      "platform": "darwin",
      "description": "Drift in installed Safari extensions per user — a browser extension is a common malware/unwanted-software vector."
    },
    "chrome_extensions": {
      "query": "SELECT browser_type, uid, profile, name, identifier, version, author, from_webstore, state, permissions, update_url, path FROM chrome_extensions;",
      "interval": 43200,
      "platform": "darwin",
      "description": "Drift in Chromium-family extensions (Chrome/Brave/Edge) across profiles, including granted permissions and webstore provenance."
    },
    "firefox_addons": {
      "query": "SELECT uid, name, identifier, creator, type, version, active, disabled, source_url, path FROM firefox_addons;",
      "interval": 43200,
      "platform": "darwin",
      "description": "Drift in installed Firefox add-ons per user, including active/disabled state and source."
    }
  }
}
