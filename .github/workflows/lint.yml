name: Lint
on:
  push:
    branches:
      - "main"
  pull_request:
permissions:
  contents: read
jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Upstream Nix using the NixOS-maintained Nix Installer
        uses: NixOS/nix-installer-action@62c1943b776c509394b550f3f983adc14e9212d6 # main @ 2026-04-06
      - name: Run Nix flake checks for all platforms (includes the treefmt drift gate)
        run: nix flake check --all-systems
      - name: Run the repo test suite
        run: nix develop .#run --command just test
      - name: Audit GitHub Actions workflows (zizmor)
        run: nix develop .#run --command zizmor --offline .github/workflows
