# Tmux Config

# ╭────────────────────────────────────────────────────────╮
# │ Builtin Bindings Cheatsheet (sometimes I forget these) │
# ╰────────────────────────────────────────────────────────╯
#    prefix-)  :  Next session
#    prefix-(  :  Previous session

# ┏ TPM Plugin Manager ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃                                                                                    ┃
# ┃    Note: All plugins are loaded at the Load TPM section below ↴                    ┃
# ┃                                         ̅ ̅ ̅ ̅ ̅ ̅ ̅ ̅                                    ┃
# ┃    Ref: https://github.com/tmux-plugins/tpm                                        ┃
# ┃    Description: TPM manages all of the following plugins and will autoinstall them ┃
# ┃                                                                                    ┃
# ┃    Key Bindings (plugin management)                                                ┃
# ┃    ─────────────────────────────────                                               ┃
# ┃    prefix + I       → Install & refresh plugins                                    ┃
# ┃    prefix + U       → Updates plugins                                              ┃
# ┃    prefix + Alt+u   → Uninstall plugins                                            ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛
set-option -g @plugin 'tmux-plugins/tpm'

# Default settings:
set-option -g @plugin 'tmux-plugins/tmux-sensible'    # https://github.com/tmux-plugins/tmux-sensible

# Navigation & search:
set-option -g @plugin 'wfxr/tmux-fzf-url'             # https://github.com/wfxr/tmux-fzf-url
# tmux-copycat dropped: archived/unmaintained; tmux 3.5+ builtins cover its cases.
# The 'prefix + /' regex-search binding copycat provided is restored as a
# plain copy-mode search further down in this file (Misc bindings).
# tmux-thumbs replaces Morantron/tmux-fingers: Rust (fast), actively maintained,
# feature parity. tpm handles the cargo build automatically on first install.
set-option -g @plugin 'fcsonline/tmux-thumbs'         # https://github.com/fcsonline/tmux-thumbs
set-option -g @plugin 'roosta/tmux-fuzzback'          # https://github.com/roosta/tmux-fuzzback

# Session & window management:
set-option -g @plugin 'tmux-plugins/tmux-sessionist'  # https://github.com/tmux-plugins/tmux-sessionist
set-option -g @plugin 'tmux-plugins/tmux-yank'        # https://github.com/tmux-plugins/tmux-yank

# ┌ tmux-floax (floating terminal window) ─────┐
# │                                            │
# │  Ref: https://github.com/omerxx/tmux-floax │
# └────────────────────────────────────────────┘
set-option -g @plugin 'omerxx/tmux-floax'

# Open floating window without prefix binding.
set-option -g @floax-bind '-n M-.'

# ┌ tmux-resurrect (persistence) ────────────────────────┐
# │                                                      │
# │  Ref: https://github.com/tmux-plugins/tmux-resurrect │
# └──────────────────────────────────────────────────────┘
set-option -g @plugin 'tmux-plugins/tmux-resurrect'

# Ensure tmux-resurrect directory exists.
run-shell "mkdir -p ~/.tmux/resurrect"

# Allows capturing/restoring pane contents.
set-option -g @resurrect-capture-pane-contents 'on'

# Restore Vim/Neovim session state.
set-option -g @resurrect-strategy-vim 'session'
set-option -g @resurrect-strategy-nvim 'session'

# ┌ tmux-continuum (automation) ─────────────────────────┐
# │                                                      │
# │  Ref: https://github.com/tmux-plugins/tmux-continuum │
# └──────────────────────────────────────────────────────┘
set-option -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-save.
set-option -g @continuum-restore "on"
set-option -g @continuum-save-interval 5

# ┌ sesh (smart session manager) ───────────────────────────────┐
# │                                                              │
# │  Ref: https://github.com/joshmedeski/sesh                    │
# └──────────────────────────────────────────────────────────────┘

# Don't exit tmux when the last session closes — switch to the next one instead.
set -g detach-on-destroy off

# Fuzzy session picker (fzf popup with preview, source cycling, session killing).
bind-key -N "Sesh: Open session picker" o run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
  --no-sort --ansi --border-label ' sesh ' --prompt '  ' \
  --header ' ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
  --bind 'tab:down,btab:up' \
  --bind 'ctrl-a:change-prompt(  )+reload(sesh list --icons)' \
  --bind 'ctrl-t:change-prompt(  )+reload(sesh list -t --icons)' \
  --bind 'ctrl-g:change-prompt(  )+reload(sesh list -c --icons)' \
  --bind 'ctrl-x:change-prompt(  )+reload(sesh list -z --icons)' \
  --bind 'ctrl-f:change-prompt(  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
  --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(  )+reload(sesh list --icons)' \
  --preview-window 'right:55%' \
  --preview 'sesh preview {}'
)\""

# Window picker.
bind-key -N "Sesh: Window picker" C-w run-shell "sesh window \"$(
  sesh window | fzf-tmux -p 60%,50% --prompt '  '
)\""

# Last session toggle (replaces synchronize-panes on the \ key).
bind-key -N "Sesh: Toggle last session" '\' run-shell \
  "sesh last || tmux display-message -d 1000 'Only one session'"

# ┌ Sesh Quick-Access Mode ─────────────────────────────────────┐
# │                                                              │
# │  prefix + C-o  enters SESH mode                              │
# │  Then press a letter to jump to that session.                │
# └──────────────────────────────────────────────────────────────┘
bind-key -N "Sesh Mode" C-o switch-client -T SESH

bind-key -N "Sesh: uriel"              -T SESH u     run-shell "sesh connect uriel"
bind-key -N "Sesh: openclaw"           -T SESH o     run-shell "sesh connect openclaw"
bind-key -N "Sesh: homelab"            -T SESH h     run-shell "sesh connect homelab"
bind-key -N "Sesh: ivy"                -T SESH i     run-shell "sesh connect ivy"
bind-key -N "Sesh: casually-concerned" -T SESH c     run-shell "sesh connect casually-concerned"
bind-key -N "Sesh: dotfiles"           -T SESH d     run-shell "sesh connect dotfiles"
bind-key -N "Sesh: nvim-config"        -T SESH n     run-shell "sesh connect nvim-config"
bind-key -N "Sesh: essential-feed"     -T SESH e     run-shell "sesh connect essential-feed"
bind-key -N "Sesh: webdavis-profile"   -T SESH g     run-shell "sesh connect webdavis-profile"
bind-key -N "Sesh: job-hunting"        -T SESH j     run-shell "sesh connect job-hunting"
bind-key -N "Sesh: justdavis-ansible"  -T SESH k     run-shell "sesh connect justdavis-ansible"
bind-key -N "Sesh: maeve"              -T SESH m     run-shell "sesh connect maeve"
bind-key -N "Sesh: dresden"            -T SESH Space run-shell "sesh connect dresden"

# ┌ Theme: 2KAbhishek/tmux2k ───────────────────┐
# │                                             │
# │  Ref: https://github.com/2KAbhishek/tmux2k/ │
# └─────────────────────────────────────────────┘
set-option -g status-position top

# Enable useful window titles.
set-option -g set-titles on
set-option -g set-titles-string "#H | #S:#W | #T"

set-option -g @plugin "2kabhishek/tmux2k"

set-option -g @tmux2k-theme "catppuccin"
set-option -g @tmux2k-icons-only false
set-option -g @tmux2k-show-powerline false
set-option -g @tmux2k-window-list-alignment "absolute-centre"
set-option -g @tmux2k-window-list-right-sep " | "
set-option -g @tmux2k-window-list-left-sep " | "
set-option -g @tmux2k-window-list-colors "blue black"
set-option -g @tmux2k-window-list-format "#I #W #(~/.local/bin/tmux-window-emoji.sh '#S:#I')"

set-option -g @tmux2k-purple "#c6a0f6"
set-option -g @tmux2k-prefix-highlight "#c6a0f6"
set-option -g @tmux2k-message-fg '#ed8796'
set-option -g @tmux2k-message-bg "#181927"
set-option -g @tmux2k-gray "#181926"
set-option -g @tmux2k-session-colors "gray purple"

set-option -g @tmux2k-cpu-colors "black yellow"
set-option -g @tmux2k-ram-colors "black orange"
# NOTE: tmux2k's catppuccin theme doesn't define a `cyan` variable.
# Use `light_blue` (#91d7e3, Catppuccin Sky) for cyan-ish text.
set-option -g @tmux2k-network-colors "black light_blue"
# Default Nerd Font wifi glyph has no right-bearing, so the single space
# network.sh emits between icon and SSID looks missing. Append a space to the
# icon so the spacing reads correctly regardless of glyph metrics.
set-option -g @tmux2k-network-wifi-icon " "
set-option -g @tmux2k-battery-colors "black green"

set-option -g @tmux2k-refresh-rate 3
set-option -g @tmux2k-left-plugins "session git"
# v2 §3.1: replaced "network battery cpu ram". last-proc is the custom plugin
# from v2 §21.4 showing "<prev_session>:<window> <emoji>".
# last-proc goes LAST: tmux2k's powerline color transitions read from the
# built-in plugin_colors array, which doesn't know about custom plugins.
# Putting last-proc at the end avoids the broken transition that made the
# next plugin's fg color resolve to empty (invisible text).
set-option -g @tmux2k-right-plugins "network ram last-proc"
# bg=black matches @tmux2k-bg-main so the plugin blends into the bar; fg=red is the accent.
set-option -g @tmux2k-last-proc-colors "black red"

# ┏━━━━━━━━━━━━━━━━━━┓
# ┃ General Settings ┃
# ┗━━━━━━━━━━━━━━━━━━┛

# Set the default copy mode to copy-mode-vi.
set-window-option -g mode-keys vi

# Required for roxma/vim-tmux-clipboard to work correctly.
set-option -g focus-events on

# Keep pane & window numbering consistent.
set-option -g pane-base-index 1

# After a window is closed, sequentially update the numbers of the remaining windows.
set-option -g renumber-windows on

# Resize panes to currently connected client.
set-option -g aggressive-resize on

# Prevent auto-renaming windows.
set-window-option -g automatic-rename on
set-window-option -g automatic-rename-format "#{?#{==:#{pane_current_command},bash},#{b:pane_current_path},#{pane_current_command}}"
set-option -g allow-rename off

# Increase terminal history limit.
set-option -g history-limit 50000

# Use system-clipboard.
set-option -g set-clipboard external

# Increase key repeat time-limit (default = 500 milliseconds).
set-option -g repeat-time 1500

# Terminal settings.
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-ghostty:RGB"

# Extended-keys for neovim/fzf modifier-key combos (tmux 3.5+).
set-option -g extended-keys on
set-option -g extended-keys-format csi-u

# Track previous session for the last-proc tmux2k plugin (v2 §21.3).
# Use #{client_last_session} — the session being LEFT — not #{hook_session_name},
# which resolves to the session being ENTERED during client-session-changed.
set-hook -g client-session-changed \
  'run-shell "tmux set-option -g @prev-session \"#{client_last_session}\""'

# Eliminate escape key lag.
set-option -s escape-time 0

# Terminal notifications (bell & flash).
set-option -g bell-action any
set-option -g visual-activity on

# set-window-option -g monitor-activity on

# ┏━━━━━━━━━━━━━━┓
# ┃ Key Bindings ┃
# ┗━━━━━━━━━━━━━━┛

# Prefix Key - Ctrl+d
# --------------------------------
unbind-key C-b
unbind-key C-d
set-option -g prefix C-d

# Navigation (Vim/Nvim aware)
# --------------------------------
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -N "Pane switching: Left"  -n C-h if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -N "Pane switching: Down"  -n C-j if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -N "Pane switching: Up"    -n C-k if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -N "Pane switching: Right" -n C-l if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -N "Pane switching: Last (toggle)" -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" 'select-pane -l'

bind-key -T copy-mode-vi -N "Pane switching: Left" C-h select-pane -L
bind-key -T copy-mode-vi -N "Pane switching: Down" C-j select-pane -D
bind-key -T copy-mode-vi -N "Pane switching: Up" C-k select-pane -U
bind-key -T copy-mode-vi -N "Pane switching: Right" C-l select-pane -R
bind-key -T copy-mode-vi -N "Pane switching: Last" 'C-\' select-pane -l

bind-key -N "Pane switching: Left (fallback Vim/Nvim plugin fails)" -r C-h select-pane -L
bind-key -N "Pane switching: Down (fallback Vim/Nvim plugin fails)" -r C-j select-pane -D
bind-key -N "Pane switching: Up (fallback Vim/Nvim plugin fails)" -r C-k select-pane -U
bind-key -N "Pane switching: Right (fallback Vim/Nvim plugin fails)" -r C-l select-pane -R
bind-key -N "Pane switching: Last (fallback Vim/Nvim plugin fails)" -r 'C-\' select-pane -l

# Fallback navigation (for nested sessions)
# ------------------------------------------
#bind-key -r M-H select-pane -L
#bind-key -r M-J select-pane -D
#bind-key -r M-K select-pane -U
#bind-key -r M-L select-pane -R

# Resize Mode
# --------------------------------
bind-key -N "Resize Mode: Start" r switch-client -T RESIZE

bind-key -N "Resize Mode: Resize Up" -T RESIZE k resize-pane -U \; switch-client -T RESIZE
bind-key -N "Resize Mode: Resize Up (by 5)" -T RESIZE K resize-pane -U 5 \; switch-client -T RESIZE

bind-key -N "Resize Mode: Resize Down" -T RESIZE j resize-pane -D \; switch-client -T RESIZE
bind-key -N "Resize Mode: Resize Down (by 5)" -T RESIZE J resize-pane -D 5 \; switch-client -T RESIZE

bind-key -N "Resize Mode: Resize Left" -T RESIZE h resize-pane -L \; switch-client -T RESIZE
bind-key -N "Resize Mode: Resize Left (by 5)" -T RESIZE H resize-pane -L 5 \; switch-client -T RESIZE

bind-key -N "Resize Mode: Resize Right" -T RESIZE l resize-pane -R \; switch-client -T RESIZE
bind-key -N "Resize Mode: Resize Right (by 5)" -T RESIZE L resize-pane -R 5 \; switch-client -T RESIZE

# Sync Mode (removed — \ key now bound to 'sesh last' above per v2 §3.2)

# Mouse mode
# --------------------------------
set-option -g mouse on

# Provide bindings w/ notifications for toggling.
bind-key -N "Mouse Mode: on" m set-option -g mouse on \; display 'Mouse: on'
bind-key -N "Mouse Mode: off" M set-option -g mouse off \; display 'Mouse: off'

# Window & Pane Creation
# --------------------------------
bind-key -N "Open New Window: at session path" b new-window -c '#{session_path}'
bind-key -N "Open New Window: at current path" c new-window -c '#{pane_current_path}'
bind-key -N "Split Pane: vertical, at session path" '"' split-window -v -c '#{session_path}'
bind-key -N "Split Pane: horizontal, at session path" '%' split-window -h -c '#{session_path}'

# Misc bindings
# --------------------------------
bind-key -N "Join: the current pane with its adjacent pane" j join-pane -t !
bind-key -N "Clear Screen: workaround for navigate → (right)" L send-keys 'C-l'
bind-key -N "Suspend the current Tmux client (works likes C-z in Vim/Nvim, but for Tmux)" C-z suspend-client
bind-key -N "Fuzzy search all key bindings (command: tmux list-keys -Na | fzf --exact)" v display-popup -E "tmux-custom-list-keys.sh | fzf --exact"
# bind-key P -N "Paste from the system clipboard" run "xclip -o -sel clip | tmux load-buffer - ; tmux paste-buffer"

# Reload tmux.conf on demand (replaces archived b0o/tmux-autoreload per v2 §3.8).
bind-key -N "Reload tmux.conf" R source-file ~/.tmux.conf \; display-message "Reloaded ~/.tmux.conf"

# Enter copy-mode and start a search (replaces tmux-copycat's 'prefix + /').
# Uses backward search since the scrollback is time-ordered and recent
# matches are what you want. 'prefix + ?' is reserved for tmux-fuzzback.
bind-key -N "Copy mode: search backward (enter pattern then Enter)" / copy-mode \; send-keys ?

# When the prefix key "hangs", the next key can be misinterpreted in Vim/Nvim, so send it literally.
bind-key a send-keys a

# ┏━━━━━━━━━━┓
# ┃ Load TPM ┃
# ┗━━━━━━━━━━┛

# Automatically install TPM (Tmux Plugin Manager), if it isn't already.
if 'test ! -d $HOME/.tmux/plugins/tpm -a "$(command -v git)" != ""' \
  'run "git clone https://github.com/tmux-plugins/tpm $HOME/.tmux/plugins/tpm \
  && $HOME/.tmux/plugins/tpm/tpm && $HOME/.tmux/plugins/tpm/bin/install_plugins"'

# Load TPM — keep at the bottom of .tmux.conf.
run '~/.tmux/plugins/tpm/tpm'

# ┏━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┓
# ┃  Stuff that has to go after "Load TPM" ┃
# ┗━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━┛

bind-key -N "Send C-d to the current process (Double-tap C-d to send one C-d)" C-d send-prefix

# ╭─ macOS shell (fix/work-around) ─────────────────────────────────────────────────────────╮
# │                                                                                         │
# │ Ref: https://github.com/tmux-plugins/tmux-resurrect/issues/94                           │
# │                                                                                         │
# │ Reason: tmux-resurrect doesn't source ~/.bash_profile. This ensures                     │
# │         tmux-resurrect/scripts/restore.sh launches shell as a "login shell" so          │
# │         that ~/.bash_profile is sourced when rebooting Tmux via tmux-resurrect.         │
# │                                                                                         │
# │ Credit: https://github.com/tmux-plugins/tmux-resurrect/issues/94#issuecomment-445250600 │
# ╰─────────────────────────────────────────────────────────────────────────────────────────╯
is_mac='test "$(uname -s)" == "Darwin"'

if-shell "$is_mac" \
  'set-option -g default-command "/opt/homebrew/bin/bash -l"' \
  'set-option -g default-command "${SHELL} -l"'
