# OPTIONAL override map: sesh session basename -> Todoist project name.
# Consumed by ~/.local/bin/sesh-preview.sh.
#
# As of the 2026-05 Todoist redesign, every tracked repo is its OWN (sub)project
# and a session's basename already equals its Todoist project name. The preview
# therefore queries `#<basename>` dynamically and this map is normally EMPTY.
#
# Add an entry ONLY when a session's basename differs from its Todoist project
# name. Quote keys containing spaces. Example (uncomment if/when relevant):
#
#   # chezmoi's source-dir basename is "chezmoi" but its project is "dotfiles"
#   # (drop once the chezmoi source relocates to webdavis/dotfiles):
#   chezmoi = "dotfiles"
