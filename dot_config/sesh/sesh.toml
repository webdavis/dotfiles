# Sesh configuration — smart tmux session manager.
# Docs: https://github.com/joshmedeski/sesh
#
# Preview wiring: dot_tmux.conf binds the picker (prefix + o) to fzf with
# `--preview '~/.local/bin/sesh-preview.sh {2..}'`, which bypasses sesh's
# built-in `sesh preview` command (that one hardcodes tmux pane-capture for
# any name matching a running tmux session, ignoring this config).
# So [default_session].preview_command and per-[[session]] preview_commands
# only matter for invocations of `sesh preview NAME` outside the picker.

cache = true
sort_order = ["tmux", "config", "zoxide"]
dir_length = 1
blacklist = ["popup", "scratch"]

[default_session]
preview_command = "~/.local/bin/sesh-preview.sh {}"

[[session]]
name = "uriel"
path = "~/workspaces/Ivy/webdavis/uriel"

[[session]]
name = "openclaw"
path = "~/.openclaw"

[[session]]
name = "homelab"
path = "~/workspaces/Ivy/webdavis/homelab"

[[session]]
name = "ivy"
path = "~/workspaces/Ivy"

[[session]]
name = "casually-concerned"
path = "~/workspaces/Ivy/projects/casually-concerned"

[[session]]
name = "dotfiles"
path = "~/.local/share/chezmoi"

[[session]]
name = "nvim-config"
path = "~/.config/nvim"

[[session]]
name = "essential-feed"
path = "~/workspaces/Ivy/webdavis/essential-feed-case-study"

[[session]]
name = "webdavis-profile"
path = "~/workspaces/Ivy/webdavis/webdavis"

[[session]]
name = "job-hunting"
path = "~/workspaces/Ivy/projects/career-campaign"

[[session]]
name = "justdavis-ansible"
path = "~/workspaces/Ivy/webdavis/justdavis-ansible"

[[session]]
name = "maeve"
path = "~/workspaces/Ivy/webdavis/Maeve"

[[session]]
name = "warden"
path = "~/workspaces/Ivy/webdavis/uriel/agents/bob/workspace/builds/warden"

# dresden uses today's Todoist tasks instead of git/eza.
# Quoted exit-0 fallback so a td failure doesn't show "Exit status 1."
[[session]]
name = "dresden"
path = "~"
disable_startup_command = true
preview_command = "td today --limit 5 2>/dev/null || echo '(no tasks or td unavailable)'"
