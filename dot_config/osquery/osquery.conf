{
  "options": {
    "logger_path": "/Users/stephen/.local/log/osquery",
    "disable_events": "true"
  },
  "schedule": {
    "zombie_count": {
      "query": "SELECT COUNT(*) AS zombie_count FROM processes WHERE state = 'Z';",
      "interval": 21600,
      "snapshot": true
    },
    "zombie_parents": {
      "query": "SELECT z.pid AS zombie_pid, z.name AS zombie_name, p.pid AS parent_pid, p.name AS parent_name FROM processes z LEFT JOIN processes p ON z.parent = p.pid WHERE z.state = 'Z';",
      "interval": 21600,
      "snapshot": true
    },
    "top_processes_by_count": {
      "query": "SELECT name, COUNT(*) AS count FROM processes GROUP BY name ORDER BY count DESC LIMIT 20;",
      "interval": 21600,
      "snapshot": true
    },
    "per_user_process_count": {
      "query": "SELECT u.username, COUNT(*) AS process_count FROM processes p LEFT JOIN users u ON p.uid = u.uid GROUP BY p.uid ORDER BY process_count DESC;",
      "interval": 21600,
      "snapshot": true
    },
    "top_memory_hogs": {
      "query": "SELECT name, ROUND(resident_size / 1048576.0, 1) AS mb FROM processes ORDER BY resident_size DESC LIMIT 10;",
      "interval": 21600,
      "snapshot": true
    }
  }
}
