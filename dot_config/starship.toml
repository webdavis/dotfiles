format = """
$sudo\
$os\
$hostname\
$shell\
$shlvl\
$jobs\
$directory\
$nix_shell\
$direnv\
$aws\
$git_branch\
$git_status\
$git_metrics\
$nodejs\
$python\
$c\
$rust\
$golang\
$php\
$java\
$kotlin\
$scala\
$haskell\
$lua\
$docker_context\
$cmd_duration\
$time\
\n$character"""

# Global prompt-render timeouts.
scan_timeout = 30
command_timeout = 500

[os.symbols]
Windows = "󰍲"
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
RedHatEnterprise = "󱄛"

[palettes.tokyonight]
color_fg0 = '#769ff0'
color_fg1 = '#83a598'
color_bg3 = '#665c54'
color_blue = '#212736'

[sudo]
disabled = false
style = "bg:#e84a96"
format = '[ $symbol]($style)[](fg:#e84a96 bg:#a3aed2)'

[os]
disabled = false
style = "bold fg:#090c0c bg:#a3aed2"
format = "[](fg:prev_bg bg:#a3aed2)[$symbol]($style)"

[hostname]
ssh_only = false
style = "fg:#090c0c bg:#a3aed2"
format = "[](fg:prev_bg bg:prev_bg)[$hostname ]($style)"

[shell]
disabled = false
bash_indicator = 'bash'
fish_indicator = '󰈺 '
powershell_indicator = '_'
unknown_indicator = 'mystery shell'
style = 'fg:#090c0c bg:#61687e'
format = "[](fg:prev_bg bg:#61687e)[ $indicator]($style)"

[shlvl]
disabled = false
symbol = '❯'
repeat = true
threshold = 1
style = 'fg:#090c0c bg:#61687e'
format = "[ $symbol]($style)"

[jobs]
symbol = '+'
number_threshold = 1
symbol_threshold = 1
style = 'fg:#090c0c bg:#61687e'
format = "[$symbol$number]($style)"

[directory]
style = "fg:#e3e5e5 bg:#487feb"
format = "[](fg:prev_bg bg:#61687e)[](fg:prev_bg bg:#487feb)[ $path ]($style)"
truncation_length = 2

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[aws]
disabled = false
force_display = false
style = 'fg:#000000 bg:#e2b75e'
symbol = 'aws'
format = '[[](fg:prev_bg bg:#e2b75e) $symbol: ($profile )(\($region\) )]($style)'

[git_branch]
symbol = ""
style = "fg:#769ff0 bg:#394260"
format = '[[](fg:prev_bg bg:#394260) $symbol $branch ]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )]($style)]($style)'

[git_metrics]
disabled = false
added_style = "fg:green bg:prev_bg"
deleted_style = "fg:red bg:prev_bg"
format = '([+$added ]($added_style)[-$deleted ]($deleted_style))'

[nodejs]
symbol = ""
style = "fg:green bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[python]
symbol = ""
style = "fg:green bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[c]
symbol = " "
style = "fg:#767676 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[rust]
symbol = ""
style = "fg:#dea584 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[golang]
symbol = ""
style = "fg:#00add8 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[php]
symbol = ""
style = "fg:#8892be bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[java]
symbol = " "
style = "fg:#b07219 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[kotlin]
symbol = ""
style = "fg:#a97bff bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[scala]
symbol = '🌟'
style = "fg:red bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[haskell]
symbol = ""
style = "fg:#9a5f96 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[lua]
symbol = "🌙"
detect_folders = ['lua']
style = "fg:#6666b2 bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[swift]
symbol = "🐦"
style = "fg:#fe4d2b bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[zig]
symbol = "↯"
style = "fg:#e7953a bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[docker_context]
symbol = ""
style = "fg:blue bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol ($version )]($style)'

[cmd_duration]
# In-prompt duration display for commands >= 2s. Complements the §7.1 notifier
# (alerter at 30s, Hue pulse at 5min). v1 was "always on" (min_time=0); v2 tunes
# to 2s so only actually-slow commands surface.
min_time = 2000
style = "fg:yellow bg:#1d2230"
format = "[[](fg:prev_bg bg:#1d2230) \ueba2 $duration]($style)"
show_milliseconds = true

[nix_shell]
disabled = false
symbol = " "
style = "fg:#7eb8da bg:#212736"
format = '[[](fg:prev_bg bg:#212736) $symbol$state( \($name\))]($style)'

[direnv]
disabled = false
style = "fg:#b4befe bg:#212736"
format = '[[](fg:prev_bg bg:#212736) direnv:$loaded/$allowed ]($style)'

[time]
disabled = false
time_format = "%R" # Format: HH:mm
style = "fg:#a0a9cb bg:#1d2230"
format = '[](fg:prev_bg bg:#1d2230)[  $time ]($style)[](fg:#1d2230)'
