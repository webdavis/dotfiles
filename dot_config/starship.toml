[cmd_duration]
# In-prompt duration display for commands >= 2s. Complements the ¬ß7.1 notifier
# (alerter at 30s, Hue pulse at 5min). v1 was "always on" (min_time=0); v2 tunes
# to 2s so only actually-slow commands surface.
min_time = 2000
style = "fg:yellow bg:#1d2230"
format = "[[Óāī](fg:prev_bg bg:#1d2230) \ueba2 $duration]($style)"
show_milliseconds = true

